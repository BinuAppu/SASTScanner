rules:

  # ─── Command Injection ────────────────────────────────────────────────────────

  - id: python-os-system
    pattern: os.system(...)
    message: >
      os.system() passes a shell command string and is vulnerable to command injection.
      Use subprocess.run() with a list of arguments and shell=False.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-78"]
      confidence: HIGH
      category: security

  - id: python-os-popen
    pattern: os.popen(...)
    message: >
      os.popen() is vulnerable to command injection. Use subprocess.run() with a
      list of arguments and shell=False.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-78"]
      confidence: HIGH
      category: security

  - id: python-subprocess-shell-true
    pattern: subprocess.$FUNC(..., shell=True, ...)
    message: >
      subprocess called with shell=True enables shell injection. Pass arguments as a
      list and remove shell=True.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-78"]
      confidence: HIGH
      category: security

  - id: python-eval
    pattern: eval(...)
    message: >
      eval() executes arbitrary Python code. Never use with user-supplied data.
      Use ast.literal_eval() for safe literal parsing.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-78"]
      confidence: MEDIUM
      category: security

  - id: python-exec
    pattern: exec(...)
    message: >
      exec() executes arbitrary Python code. Avoid using with untrusted input.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-78"]
      confidence: MEDIUM
      category: security

  # ─── SQL Injection ────────────────────────────────────────────────────────────

  - id: python-sql-injection-format
    pattern: $CUR.execute($Q % ...)
    message: >
      SQL query built with %-formatting is vulnerable to SQL injection.
      Use parameterized queries: cursor.execute(query, (params,)).
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-89"]
      confidence: HIGH
      category: security

  - id: python-sql-injection-fstring
    pattern: $CUR.execute(f"...")
    message: >
      SQL query built with an f-string is vulnerable to SQL injection.
      Use parameterized queries: cursor.execute(query, (params,)).
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-89"]
      confidence: HIGH
      category: security

  - id: python-sql-injection-concat
    pattern: $CUR.execute($Q + ...)
    message: >
      SQL query built via string concatenation is vulnerable to SQL injection.
      Use parameterized queries: cursor.execute(query, (params,)).
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-89"]
      confidence: HIGH
      category: security

  # ─── Insecure Deserialization ─────────────────────────────────────────────────

  - id: python-pickle-loads
    pattern: pickle.loads(...)
    message: >
      pickle.loads() deserialises arbitrary Python objects and can execute code.
      Never deserialise untrusted data. Use JSON or a safer format.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-502"]
      confidence: HIGH
      category: security

  - id: python-pickle-load
    pattern: pickle.load(...)
    message: >
      pickle.load() deserialises arbitrary Python objects. Never use with untrusted data.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-502"]
      confidence: HIGH
      category: security

  - id: python-yaml-load-unsafe
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader)
      - pattern-not: yaml.load(..., Loader=yaml.BaseLoader)
      - pattern-not: yaml.load(..., Loader=yaml.FullLoader)
    message: >
      yaml.load() without an explicit Loader can execute arbitrary Python.
      Use yaml.safe_load() or yaml.load(data, Loader=yaml.SafeLoader).
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-502"]
      confidence: HIGH
      category: security

  - id: python-marshal-loads
    pattern: marshal.loads(...)
    message: >
      marshal.loads() can execute arbitrary code from untrusted data.
      Use JSON or another safe serialisation format.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-502"]
      confidence: HIGH
      category: security

  # ─── Path Traversal ───────────────────────────────────────────────────────────

  - id: python-open-request-args
    patterns:
      - pattern: open(request.$X, ...)
    message: >
      Opening a file using a request parameter is vulnerable to path traversal.
      Use werkzeug.utils.secure_filename() and verify the resolved path stays
      within the intended directory.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-22"]
      confidence: HIGH
      category: security

  # ─── Weak Cryptography ────────────────────────────────────────────────────────

  - id: python-hashlib-md5
    pattern: hashlib.md5(...)
    message: >
      MD5 is cryptographically broken. Use hashlib.sha256() for integrity checks
      and bcrypt/argon2 for passwords.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-327"]
      confidence: HIGH
      category: security

  - id: python-hashlib-sha1
    pattern: hashlib.sha1(...)
    message: >
      SHA-1 is deprecated for security use. Use hashlib.sha256() or stronger.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-327"]
      confidence: HIGH
      category: security

  - id: python-insecure-random
    pattern-either:
      - pattern: random.random()
      - pattern: random.randint(...)
      - pattern: random.choice(...)
      - pattern: random.shuffle(...)
      - pattern: random.sample(...)
    message: >
      The random module is not cryptographically secure. Use the secrets module
      for tokens, passwords, or any security-sensitive randomness.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-330"]
      confidence: LOW
      category: security

  # ─── SSL / TLS ────────────────────────────────────────────────────────────────

  - id: python-ssl-no-verify
    pattern: requests.$METHOD(..., verify=False, ...)
    message: >
      SSL certificate verification is disabled. This allows MITM attacks.
      Remove verify=False and ensure valid certificates are in use.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-295"]
      confidence: HIGH
      category: security

  - id: python-ssl-context-no-check-hostname
    patterns:
      - pattern: |
          $CTX = ssl.create_default_context(...)
          ...
          $CTX.check_hostname = False
    message: >
      Disabling check_hostname bypasses hostname verification, enabling MITM attacks.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-295"]
      confidence: HIGH
      category: security

  # ─── Hardcoded Secrets ────────────────────────────────────────────────────────

  - id: python-hardcoded-password-arg
    patterns:
      - pattern: $FUNC(..., password="...", ...)
      - pattern-not: $FUNC(..., password="", ...)
    message: >
      Hardcoded password in function argument. Use environment variables or a
      secrets manager instead.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-259"]
      confidence: MEDIUM
      category: security

  - id: python-hardcoded-password-assign
    patterns:
      - pattern: password = "..."
      - pattern-not: password = ""
    message: >
      Hardcoded password detected. Store credentials in environment variables or
      a secrets manager.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-259"]
      confidence: LOW
      category: security

  # ─── Flask-Specific ───────────────────────────────────────────────────────────

  - id: python-flask-debug-true
    pattern: app.run(..., debug=True, ...)
    message: >
      Flask debug mode exposes an interactive debugger and detailed tracebacks to
      attackers. Set debug=False or control via the FLASK_DEBUG environment variable.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-489"]
      confidence: HIGH
      category: security

  - id: python-flask-secret-key-hardcoded
    patterns:
      - pattern: app.secret_key = "..."
      - pattern-not: app.secret_key = ""
    message: >
      Hardcoded Flask secret key. If this key is exposed, session cookies can be
      forged. Load the key from an environment variable.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-321"]
      confidence: HIGH
      category: security

  - id: python-flask-config-secret-hardcoded
    patterns:
      - pattern: app.config["SECRET_KEY"] = "..."
      - pattern-not: app.config["SECRET_KEY"] = ""
    message: >
      Hardcoded SECRET_KEY in Flask config. Load from environment variable instead.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-321"]
      confidence: HIGH
      category: security

  # ─── SSRF ─────────────────────────────────────────────────────────────────────

  - id: python-requests-ssrf
    patterns:
      - pattern: requests.$METHOD(request.$ATTR, ...)
    message: >
      Making HTTP requests with a user-controlled URL is vulnerable to SSRF.
      Validate and whitelist allowed hosts before making any outbound requests.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-918"]
      confidence: HIGH
      category: security

  # ─── XML External Entity (XXE) ────────────────────────────────────────────────

  - id: python-xxe-etree-parse
    pattern: xml.etree.ElementTree.parse(...)
    message: >
      xml.etree.ElementTree is vulnerable to XXE in Python < 3.8.
      Use defusedxml.ElementTree.parse() to prevent XXE attacks.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-611"]
      confidence: MEDIUM
      category: security

  - id: python-xxe-minidom
    pattern: xml.dom.minidom.parseString(...)
    message: >
      xml.dom.minidom is vulnerable to XXE. Use defusedxml.minidom.parseString()
      to prevent external entity attacks.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-611"]
      confidence: MEDIUM
      category: security

  # ─── Jinja2 / Template Injection ──────────────────────────────────────────────

  - id: python-jinja2-autoescape-off
    patterns:
      - pattern: jinja2.Environment(..., autoescape=False, ...)
    message: >
      Jinja2 autoescaping is disabled. Enable it with autoescape=True (or use
      select_autoescape()) to prevent XSS in rendered templates.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-79"]
      confidence: HIGH
      category: security

  - id: python-jinja2-from-string-user-input
    pattern: jinja2.Template($TMPL).render(...)
    message: >
      Rendering a Jinja2 template from a variable may allow Server-Side Template
      Injection (SSTI) if the template string comes from user input.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-94"]
      confidence: LOW
      category: security

  # ─── Timing Attacks ───────────────────────────────────────────────────────────

  - id: python-timing-attack-str-compare
    patterns:
      - pattern: $TOKEN == $OTHER
      - metavariable-regex:
          metavariable: $TOKEN
          regex: (?i)(token|secret|password|passwd|key|hash|digest|signature|hmac)
    message: >
      Direct string comparison of secrets is vulnerable to timing attacks.
      Use hmac.compare_digest() or secrets.compare_digest() for constant-time comparison.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-208"]
      confidence: LOW
      category: security

  # ─── Temporary Files ──────────────────────────────────────────────────────────

  - id: python-insecure-tempfile
    pattern-either:
      - pattern: tempfile.mktemp(...)
      - pattern: open("/tmp/...", ...)
    message: >
      Using predictable temporary file paths creates a race condition (TOCTOU).
      Use tempfile.mkstemp() or tempfile.TemporaryFile() instead.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-377"]
      confidence: MEDIUM
      category: security

  # ─── Assert Statements ────────────────────────────────────────────────────────

  - id: python-assert-used
    pattern: assert ...
    message: >
      assert statements are removed when Python is run with the -O (optimise) flag,
      making them unsuitable for security checks. Use proper exception handling.
    languages: [python]
    severity: INFO
    metadata:
      cwe: ["CWE-617"]
      confidence: HIGH
      category: security

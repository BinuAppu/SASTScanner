rules:

  # ─── SQL Injection ────────────────────────────────────────────────────────────

  - id: java-sql-injection-string-concat
    patterns:
      - pattern: $STMT.executeQuery($Q + ...)
    message: >
      SQL query built via string concatenation is vulnerable to SQL injection.
      Use PreparedStatement with parameter placeholders instead.
    languages: [java]
    severity: ERROR
    metadata:
      cwe: ["CWE-89"]
      confidence: HIGH
      category: security

  - id: java-sql-injection-execute
    patterns:
      - pattern: $STMT.execute($Q + ...)
    message: >
      SQL query built via string concatenation. Use PreparedStatement.
    languages: [java]
    severity: ERROR
    metadata:
      cwe: ["CWE-89"]
      confidence: HIGH
      category: security

  # ─── Command Injection ────────────────────────────────────────────────────────

  - id: java-runtime-exec
    pattern: Runtime.getRuntime().exec(...)
    message: >
      Runtime.exec() with a command string is vulnerable to command injection.
      Use ProcessBuilder with a list of arguments and avoid shell interpretation.
    languages: [java]
    severity: ERROR
    metadata:
      cwe: ["CWE-78"]
      confidence: HIGH
      category: security

  - id: java-processbuilder-unsafe
    pattern: new ProcessBuilder($CMD, ...)
    message: >
      ProcessBuilder may be vulnerable to command injection if arguments come
      from user input. Validate and sanitise all arguments.
    languages: [java]
    severity: WARNING
    metadata:
      cwe: ["CWE-78"]
      confidence: LOW
      category: security

  # ─── Weak Cryptography ────────────────────────────────────────────────────────

  - id: java-weak-hash-md5
    pattern: MessageDigest.getInstance("MD5")
    message: >
      MD5 is cryptographically broken. Use SHA-256 or SHA-3.
    languages: [java]
    severity: WARNING
    metadata:
      cwe: ["CWE-327"]
      confidence: HIGH
      category: security

  - id: java-weak-hash-sha1
    pattern: MessageDigest.getInstance("SHA-1")
    message: >
      SHA-1 is deprecated for security use. Use SHA-256 or stronger.
    languages: [java]
    severity: WARNING
    metadata:
      cwe: ["CWE-327"]
      confidence: HIGH
      category: security

  - id: java-des-cipher
    pattern: Cipher.getInstance("DES/...")
    message: >
      DES encryption is insecure due to its small key size. Use AES-256-GCM.
    languages: [java]
    severity: ERROR
    metadata:
      cwe: ["CWE-326"]
      confidence: HIGH
      category: security

  # ─── Insecure Deserialization ─────────────────────────────────────────────────

  - id: java-object-input-stream
    pattern: new ObjectInputStream(...)
    message: >
      Java ObjectInputStream deserialises arbitrary objects and can execute code.
      Validate the class whitelist or use a safer serialisation format like JSON.
    languages: [java]
    severity: ERROR
    metadata:
      cwe: ["CWE-502"]
      confidence: MEDIUM
      category: security

  # ─── XXE ─────────────────────────────────────────────────────────────────────

  - id: java-xxe-documentbuilderfactory
    pattern: DocumentBuilderFactory.newInstance()
    message: >
      DocumentBuilderFactory without XXE mitigations is vulnerable to XXE attacks.
      After creation, call setFeature("http://apache.org/xml/features/disallow-doctype-decl", true)
      to disable external entity processing.
    languages: [java]
    severity: WARNING
    metadata:
      cwe: ["CWE-611"]
      confidence: LOW
      category: security

  # ─── Insecure Random ─────────────────────────────────────────────────────────

  - id: java-insecure-random
    pattern: new Random()
    message: >
      java.util.Random is not cryptographically secure. Use SecureRandom for
      security-sensitive values.
    languages: [java]
    severity: WARNING
    metadata:
      cwe: ["CWE-330"]
      confidence: LOW
      category: security

  # ─── SSL / TLS ────────────────────────────────────────────────────────────────

  - id: java-ssl-no-verify-hostname
    pattern: $SC.setHostnameVerifier(SSLConnectionSocketFactory.ALLOW_ALL_HOSTNAME_VERIFIER)
    message: >
      All-hostname verifier disables SSL hostname verification, enabling MITM attacks.
      Use the default hostname verifier.
    languages: [java]
    severity: ERROR
    metadata:
      cwe: ["CWE-295"]
      confidence: HIGH
      category: security

  # ─── Path Traversal ───────────────────────────────────────────────────────────

  - id: java-path-traversal-file
    pattern: new File(request.$METHOD(...), ...)
    message: >
      Creating a File with user-supplied input is vulnerable to path traversal.
      Validate and canonicalise the path to ensure it stays within the intended directory.
    languages: [java]
    severity: ERROR
    metadata:
      cwe: ["CWE-22"]
      confidence: HIGH
      category: security

rules:

  # ─── AWS Credentials ──────────────────────────────────────────────────────────

  - id: secret-aws-access-key-id
    pattern-regex: '(?<![A-Z0-9])(AKIA[0-9A-Z]{16})(?![A-Z0-9])'
    message: >
      Hardcoded AWS Access Key ID detected. Remove from source, revoke the key
      immediately, and use IAM roles or environment variables.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      confidence: HIGH
      category: security

  - id: secret-aws-secret-key
    pattern-regex: '(?i)aws[_\-\s]?secret[_\-\s]?(?:access[_\-\s]?)?key[\s]*[=:]\s*["\x27]?([A-Za-z0-9/+=]{40})'
    message: >
      Hardcoded AWS Secret Access Key detected. Remove from source, revoke
      immediately, and use IAM roles or AWS Secrets Manager.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      confidence: HIGH
      category: security

  # ─── GitHub / GitLab Tokens ───────────────────────────────────────────────────

  - id: secret-github-token
    pattern-regex: '(ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9]{36}'
    message: >
      GitHub personal access token detected in source code. Revoke the token
      immediately and use environment variables.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      confidence: HIGH
      category: security

  - id: secret-gitlab-token
    pattern-regex: 'glpat-[A-Za-z0-9\-_]{20}'
    message: >
      GitLab personal access token detected. Revoke and move to environment variables.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      confidence: HIGH
      category: security

  # ─── Stripe Keys ──────────────────────────────────────────────────────────────

  - id: secret-stripe-live-key
    pattern-regex: 'sk_live_[0-9a-zA-Z]{24,}'
    message: >
      Stripe live secret key detected. Revoke immediately via the Stripe dashboard
      and move to a secrets manager.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      confidence: HIGH
      category: security

  - id: secret-stripe-test-key
    pattern-regex: 'sk_test_[0-9a-zA-Z]{24,}'
    message: >
      Stripe test secret key detected in source code. Move to environment variables.
    languages: [generic]
    severity: WARNING
    metadata:
      cwe: ["CWE-798"]
      confidence: HIGH
      category: security

  # ─── Google / GCP ─────────────────────────────────────────────────────────────

  - id: secret-google-api-key
    pattern-regex: 'AIza[0-9A-Za-z\-_]{35}'
    message: >
      Google API key detected. Restrict the key in the Google Cloud Console
      and move it to a secrets manager.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      confidence: HIGH
      category: security

  # ─── Slack ────────────────────────────────────────────────────────────────────

  - id: secret-slack-token
    pattern-regex: 'xox[baprs]-[0-9]{12}-[0-9]{12}-[A-Za-z0-9]{24}'
    message: >
      Slack API token detected. Revoke immediately via the Slack API settings
      and use environment variables.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      confidence: HIGH
      category: security

  # ─── Private Keys ─────────────────────────────────────────────────────────────

  - id: secret-rsa-private-key
    pattern-regex: '-----BEGIN RSA PRIVATE KEY-----'
    message: >
      RSA private key committed to source code. Remove immediately, rotate the
      key pair, and use a key management service.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-321"]
      confidence: HIGH
      category: security

  - id: secret-ec-private-key
    pattern-regex: '-----BEGIN EC PRIVATE KEY-----'
    message: >
      EC private key committed to source code. Remove and rotate immediately.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-321"]
      confidence: HIGH
      category: security

  - id: secret-openssh-private-key
    pattern-regex: '-----BEGIN OPENSSH PRIVATE KEY-----'
    message: >
      OpenSSH private key committed to source code. Remove and rotate immediately.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-321"]
      confidence: HIGH
      category: security

  # ─── Database Connection Strings ──────────────────────────────────────────────

  - id: secret-db-connection-string
    pattern-regex: '(?i)(mysql|postgresql|postgres|mssql|mongodb|redis):\/\/[^\s"''<>]+:[^\s"''<>@]+@'
    message: >
      Database connection string with embedded credentials detected.
      Use environment variables for database URIs and never commit credentials.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-259"]
      confidence: HIGH
      category: security

  # ─── Generic Hardcoded Passwords ──────────────────────────────────────────────

  - id: secret-hardcoded-password
    pattern-regex: '(?i)(?:password|passwd|pwd)\s*[=:]\s*["\x27]([^"''\s]{6,})["\x27]'
    message: >
      Hardcoded password detected in source code. Use environment variables or
      a secrets manager.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-259"]
      confidence: MEDIUM
      category: security

  - id: secret-hardcoded-api-key
    pattern-regex: '(?i)(?:api[_\-]?key|apikey|api_secret)\s*[=:]\s*["\x27]([A-Za-z0-9\-_]{16,})["\x27]'
    message: >
      Hardcoded API key detected. Store in environment variables or a vault.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      confidence: MEDIUM
      category: security

  - id: secret-hardcoded-token
    pattern-regex: '(?i)(?:token|auth[_\-]?token|access[_\-]?token)\s*[=:]\s*["\x27]([A-Za-z0-9\-_\.]{20,})["\x27]'
    message: >
      Hardcoded token detected in source code. Move to environment variables or
      a secrets management system.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      confidence: MEDIUM
      category: security

  - id: secret-hardcoded-generic-secret
    pattern-regex: '(?i)(?:secret|client_secret|app_secret)\s*[=:]\s*["\x27]([A-Za-z0-9\-_\.]{12,})["\x27]'
    message: >
      Hardcoded secret value detected. Move to environment variables or a
      dedicated secrets manager.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      confidence: MEDIUM
      category: security

  # ─── JWT ──────────────────────────────────────────────────────────────────────

  - id: secret-jwt-token
    pattern-regex: 'eyJ[A-Za-z0-9\-_]+\.eyJ[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]+'
    message: >
      JWT token hardcoded in source code. Generate tokens at runtime and never
      embed them in source.
    languages: [generic]
    severity: WARNING
    metadata:
      cwe: ["CWE-798"]
      confidence: MEDIUM
      category: security

  # ─── SSH Config ───────────────────────────────────────────────────────────────

  - id: secret-ssh-no-host-check
    pattern-regex: '(?i)StrictHostKeyChecking\s+no'
    message: >
      SSH StrictHostKeyChecking disabled. This allows MITM attacks. Enable host
      key verification.
    languages: [generic]
    severity: WARNING
    metadata:
      cwe: ["CWE-295"]
      confidence: HIGH
      category: security
